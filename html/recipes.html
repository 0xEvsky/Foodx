<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodX - Recipes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/recipes.css">
    <script src="../js/recipes.js" defer></script>
    
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">FoodX</div>
            <div class="nav-menu">
                <a href="../html/index.html">Home</a>
                <a href="../htmlrecipes.html" class="active">Recipes</a>
                <a href="../html/about.html">About</a>
                <a href="../html/contact.html">Contact</a>
                <li><a href="../html/profile.html" class="profile-icon"><i class="fas fa-user"></i></a></li>
            </div>
        </header>

    <div class="search-and-filter-section">
        <div class="container">
            <form id="search-form" class="enhanced-search">
                <div class="search-input-group">
                    <input type="search" id="search-input" name="search" placeholder="Search for a recipe...">
                    <button id="search_submit_button"><i class="fas fa-search"></i></button>
                </div>
                <div class="filter-options">
                    <select name="category" id="category-filter">
                        <option value="">All Categories</option>
                        <option value="breakfast">Breakfast</option>
                        <option value="lunch">Lunch</option>
                        <option value="dinner">Dinner</option>
                        <option value="desserts">Desserts</option>
                        <option value="snacks">Snacks</option>
                    </select>
                    <select name="cuisine" id="cuisine-filter">
                        <option value="">All Cuisines</option>
                        <option value="italian">Italian</option>
                        <option value="asian">Asian</option>
                        <option value="mexican">Mexican</option>
                        <option value="mediterranean">Mediterranean</option>
                        <option value="indian">Indian</option>
                    </select>
                    <select name="diet" id="diet-filter">
                        <option value="">All Diets</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="gluten-free">Gluten-Free</option>
                        <option value="keto">Keto</option>
                    </select>
                    <select name="sort" id="sort-options">
                        <option value="popular">Most Popular</option>
                        <option value="recent">Recently Added</option>
                        <option value="quick">Quick & Easy</option>
                        <option value="rating">Highest Rated</option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <div class="footer-logo">
                FoodX
                <div class="social-icons">
                    <span class="social-icon">📘</span>
                    <span class="social-icon">📱</span>
                    <span class="social-icon">📺</span>
                    <span class="social-icon">📷</span>
                </div>
            </div>
            <div class="footer-links">
                <div class="footer-column">
                    <h3>Topic</h3>
                    <p>Page</p>
                    <p>Page</p>
                    <p>Page</p>
                    <p>Page</p>
                </div>
                <div class="footer-column">
                    <h3>Topic</h3>
                    <p>Page</p>
                    <p>Page</p>
                    <p>Page</p>
                    <p>Page</p>
                </div>
                <div class="footer-column">
                    <h3>Topic</h3>
                    <p>Page</p>
                    <p>Page</p>
                    <p>Page</p>
                    <p>Page</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
