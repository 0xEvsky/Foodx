<!-- Update the style section with scoped styles -->
<!-- Update the style section with improved centering -->
<style>
    /* Modal Background */
    .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
        z-index: 1000; /* Ensure it's above other content */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        overflow: auto; /* Allow scrolling if needed */
    }
    
    /* Popup container styles */
    .modal .popup-container {
        margin: auto; /* Center in all directions */
        max-width: 600px;
        width: 90%;
        background: #fff;
        border-radius: 28px;
        box-shadow: 0 4px 24px 0 rgba(0,0,0,0.12);
        padding: 32px 24px 40px 24px;
        border: 3px solid #ff9100;
        position: relative;
        transform: translateY(0); /* Reset any transforms */
    }
    
    /* Allergy grid styles */
    .modal .allergy-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px 24px;
        margin-bottom: 40px;
    }
    
    /* Allergy button styles */
    .modal .allergy-btn {
        background: #ededed;
        border: none;
        border-radius: 24px;
        font-size: 1.5rem;
        font-weight: 700;
        color: #222;
        padding: 28px 0;
        cursor: pointer;
        transition: box-shadow 0.3s, background 0.3s;
        outline: none;
        box-shadow: 0 2px 8px 0 rgba(0,0,0,0.04);
        position: relative;
    }
    
    .modal .allergy-btn.selected {
        background: #fff;
        color: #222;
        z-index: 1;
        box-shadow: inset 0 0 0 2px #ff9100;
    }
    
    /* Add button styles */
    .modal .add-btn {
        width: 100%;
        background: #ff9100;
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        border: none;
        border-radius: 24px;
        padding: 24px 0;
        margin-top: 24px;
        cursor: pointer;
        transition: background 0.2s;
        box-shadow: 0 2px 8px 0 rgba(0,0,0,0.04);
    }
    
    .modal .add-btn:hover {
        background: #ffab40;
    }
</style>
