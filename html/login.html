<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodX</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/general.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
    <main class="auth-container">
        <div class="auth-form-container login-container">
            <h2>Welcome back!</h2>
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="user@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn btn-block btn-primary">Login</button>
            </form>
            <div class="auth-switch">
                <span>Don't have an account?</span>
                <a href="signup.html" class="btn btn-secondary">Sign up</a>
            </div>
        </div>
    </main>
</body>
</html>
