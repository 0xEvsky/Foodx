<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodX</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
    <main class="auth-container login-layout">
        <div class="auth-welcome-text">
            <h1>Welcome<br>Back!</h1>
            <p>Continue your culinary journey</p>
        </div>

        <div class="auth-form-container login-container">
            <h2>Login to Your Account</h2>
            <form action="#">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="Email address" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-block btn-primary">Login</button>
                <div class="auth-switch">
                    <a href="signup.html" class="btn btn-block btn-secondary">Don't have an account?</a>
                </div>
            </form>
        </div>
    </main>
    <script src="../js/login.js"></script>
</body>
</html>
