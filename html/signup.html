<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FoodX</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
    <main class="auth-container signup-layout">
        <div class="auth-welcome-text">
            <h1>Join<br>FoodX</h1>
            <p>Begin your culinary journey today</p>
        </div>

        <div class="auth-form-container signup-container">
            <h2>Create an Account</h2>
            <form action="#">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
                <button type="submit" class="btn btn-block btn-primary">Create Account</button>
                <div class="auth-switch">
                    <a href="login.html" class="btn btn-block btn-secondary">Already have an account?</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
