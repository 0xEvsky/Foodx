<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FoodX Admin Dashboard</title>
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="admin-page-done">
      <div class="overlap-wrapper">
        <div class="overlap">
          <div class="ellipse" aria-hidden="true"></div>
          <div class="overlap-group">
            <div class="div" aria-hidden="true"></div>
            <div class="ellipse-2" aria-hidden="true"></div>
            <header class="navigation">
              <h1 class="text-wrapper">FoodX</h1>
              <h2 class="text-wrapper-2">Admin Dashboard</h2>
            </header>
            <button class="button"><span class="text-wrapper-3">Add new recipe</span></button>
            <main class="group">
              <section class="recent-activity">
                <h3 class="text-wrapper-4">Recent Activity</h3>
                <div class="frame">
                  <ul class="user-johndoe">
                    <li>🔹 User JohnDoe submitted a new recipe: Spaghetti Carbonara – Pending Approval</li>
                    <li>🔹 User JaneCook updated the recipe: Vegan Tacos</li>
                    <li>🔹 User ChefMike left a review on Grilled Chicken Salad</li>
                  </ul>
                </div>
              </section>
              <section class="recent-activity-2">
                <h3 class="recent-activity-3">Manage Recipes</h3>
                <ul class="recipe-list">
                  <li class="recipe-item">
                    <div class="overlap-2">
                      <div class="div-wrapper">
                        <div class="overlap-group-2"><span class="text-wrapper-5">Recipe one</span></div>
                      </div>
                      <button class="button-2"><span class="text-wrapper-6">Edit</span></button>
                      <button class="button-3"><span class="text-wrapper-7">Remove</span></button>
                    </div>
                  </li>
                  <li class="recipe-item">
                    <div class="overlap-2">
                      <div class="div-wrapper">
                        <div class="overlap-group-2"><span class="text-wrapper-5">Recipe two</span></div>
                      </div>
                      <button class="button-2"><span class="text-wrapper-6">Edit</span></button>
                      <button class="button-3"><span class="text-wrapper-7">Remove</span></button>
                    </div>
                  </li>
                  <li class="recipe-item">
                    <div class="overlap-2">
                      <div class="div-wrapper">
                        <div class="overlap-group-2"><span class="text-wrapper-5">Recipe three</span></div>
                      </div>
                      <button class="button-2"><span class="text-wrapper-6">Edit</span></button>
                      <button class="button-3"><span class="text-wrapper-7">Remove</span></button>
                    </div>
                  </li>
                </ul>
              </section>
            </main>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
