<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FoodX</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="auth-page">
    <div class="auth-outer-container">
        <div id="auth-container" class="auth-container show-login">
            <!-- Email Form -->
            <div class="auth-form-wrapper login-form-wrapper" id="email-form-container">
                <div class="auth-welcome-text">
                    <h1>Forgot<br>Password?</h1>
                    <p>Enter your email to recover your account</p>
                </div>
                <div class="auth-form-container">
                    <h2>Recover Account</h2>
                    <form id="forgot-password-email-form">
                        <div class="form-group">
                            <label for="recovery-email">Email address</label>
                            <input type="email" id="recovery-email" name="email" placeholder="Enter your email address" required>
                            <span class="error-message"></span>
                        </div>
                        <div class="server-error-message" id="forgot-email-server-error"></div>
                        <button type="submit" class="btn btn-block btn-primary">
                            <span class="btn-text">Find Account</span>
                            <span class="spinner"></span>
                        </button>
                        <div class="auth-switch">
                            <span>Remembered your password?</span>
                            <a href="{% url 'login' %}" class="btn-link">Login</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Security Questions Form -->
            <div class="auth-form-wrapper security-form-wrapper" id="security-questions-container" style="display: none; opacity: 0;">
                <div class="auth-welcome-text">
                    <h1>Security<br>Questions</h1>
                    <p>Answer your security questions to reset your password</p>
                </div>
                <div class="auth-form-container">
                    <h2>Verify Your Identity</h2>
                    <form id="security-questions-form">
                        <div id="questions-list">
                            <!-- Questions will be loaded here by JS -->
                        </div>
                        <div class="server-error-message" id="forgot-questions-server-error"></div>
                        <button type="submit" class="btn btn-block btn-primary">
                            <span class="btn-text">Verify Answers</span>
                            <span class="spinner"></span>
                        </button>
                        <div class="auth-switch">
                            <span>Can't answer?</span>
                            <button type="button" id="recover-via-email" class="btn-link">Recover via Email</button>
                        </div>
                        <div class="auth-switch">
                            <span>Remembered your password?</span>
                            <a href="{% url 'login' %}" class="btn-link">Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'js/common.js' %}" defer></script>
    <script src="{% static 'js/forgot_password.js' %}"></script>
</body>
</html>
