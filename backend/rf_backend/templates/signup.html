<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FoodX</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="auth-page">
    <main class="auth-container signup-layout">
        <div class="auth-welcome-text">
            <h1>Join<br>FoodX</h1>
            <p>Begin your culinary journey today</p>
        </div>

        <div class="auth-form-container signup-container">
            <h2>Create an Account</h2>
            <form action="#">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                </div>
                <div class="form-group">
                    <label for="security_question_1">Security Question 1</label>
                    <select id="security_question_1" name="security_question_1" required>
                        <option value="" disabled selected>Select a question</option>
                        <option value="mother_maiden_name">What is your mother's maiden name?</option>
                        <option value="first_pet_name">What was the name of your first pet?</option>
                        <option value="birth_city">In what city were you born?</option>
                        <option value="childhood_nickname">What was your childhood nickname?</option>
                        <option value="favorite_teacher">What is the name of your favorite teacher?</option>
                    </select>
                    <label for="security_answer_1" class="sr-only">Answer 1</label>
                    <input type="text" id="security_answer_1" name="security_answer_1" placeholder="Your answer" required>
                </div>
                <div class="form-group">
                    <label for="security_question_2">Security Question 2</label>
                    <select id="security_question_2" name="security_question_2" required>
                        <option value="" disabled selected>Select a question</option>
                        <option value="mother_maiden_name">What is your mother's maiden name?</option>
                        <option value="first_pet_name">What was the name of your first pet?</option>
                        <option value="birth_city">In what city were you born?</option>
                        <option value="childhood_nickname">What was your childhood nickname?</option>
                        <option value="favorite_teacher">What is the name of your favorite teacher?</option>
                    </select>
                    <label for="security_answer_2" class="sr-only">Answer 2</label>
                    <input type="text" id="security_answer_2" name="security_answer_2" placeholder="Your answer" required>
                </div>
                <div class="form-group">
                    <label for="security_question_3">Security Question 3</label>
                    <select id="security_question_3" name="security_question_3" required>
                        <option value="" disabled selected>Select a question</option>
                        <option value="mother_maiden_name">What is your mother's maiden name?</option>
                        <option value="first_pet_name">What was the name of your first pet?</option>
                        <option value="birth_city">In what city were you born?</option>
                        <option value="childhood_nickname">What was your childhood nickname?</option>
                        <option value="favorite_teacher">What is the name of your favorite teacher?</option>
                    </select>
                    <label for="security_answer_3" class="sr-only">Answer 3</label>
                    <input type="text" id="security_answer_3" name="security_answer_3" placeholder="Your answer" required>
                </div>
                <div class="form-group form-check">
                    <input type="checkbox" id="admin_signup" name="admin_signup" class="form-check-input">
                    <label for="admin_signup" class="form-check-label">Sign up as Admin?</label>
                </div>
                <div class="form-group" id="admin_passcode_group" style="display: none;">
                    <label for="admin_passcode">Admin Passcode</label>
                    <input type="password" id="admin_passcode" name="admin_passcode" placeholder="Enter admin passcode">
                </div>
                <button type="submit" class="btn btn-block btn-primary">Create Account</button>
                <div class="auth-switch">
                    <a href="{% url 'login' %}" class="btn btn-block btn-secondary">Already have an account?</a>
                </div>
            </form>
        </div>
    </main>
    <script src="{% static 'js/signup.js' %}"></script>
</body>
</html>
