<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Recipe - Recipe Finder</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/edit_recipe.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Include your header/navigation here -->
    
    <!-- Add hero section -->
    <div class="hero-section-small">
        <div class="container">
            <h1>Edit Your Recipe</h1>
            <p>Update your culinary masterpiece</p>
        </div>
    </div>
     
    <main class="container">
        <section class="form-container">
            <form id="edit-recipe-form">
                <div class="form-row">
                    <div class="form-col">
                        <div class="form-group">
                            <label for="recipe_name">Recipe Name:</label>
                            <input type="text" id="recipe_name" name="recipe_name" required>
                        </div>
                        <div class="form-group">
                            <label for="recipe_image_file">Recipe Image:</label>
                            <input type="file" id="recipe_image_file" name="recipe_image_file" accept="image/*">
                            <div class="image-preview-container">
                                <img id="image-preview" src="" alt="Recipe image preview" style="max-width: 100%; max-height: 200px; display: none;">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="recipe_description">Description:</label>
                            <textarea id="recipe_description" name="recipe_description"></textarea>
                        </div>
                    </div>
                    <div class="form-col">
                        <div class="form-group">
                            <label for="cook_time">Cook Time (minutes):</label>
                            <input type="number" id="cook_time" name="cook_time">
                        </div>
                        <div class="form-group">
                            <label for="recipe_servings">Servings:</label>
                            <input type="number" id="recipe_servings" name="recipe_servings">
                        </div>
                        <div class="form-group">
                            <label for="course">Course:</label>
                            <select id="course" name="course" required>
                                <option value="appetizers">Appetizers</option>
                                <option value="main course">Main Course</option>
                                <option value="dessert">Dessert</option>
                                <option value="lunch">Lunch</option>
                                <option value="dinner">Dinner</option>
                                <option value="snacks">Snacks</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="cuisine">Cuisine:</label>
                            <select id="cuisine" name="cuisine" required>
                                <option value="">Select a cuisine</option>
                                <option value="American">American</option>
                                <option value="Italian">Italian</option>
                                <option value="Mexican">Mexican</option>
                                <option value="Asian">Asian</option>
                                <option value="Mediterranean">Mediterranean</option>
                                <option value="Indian">Indian</option>
                                <option value="French">French</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="section-divider">
                    <span>Ingredients</span>
                </div>
                
                <div class="form-group" id="ingredients-group">
                    <label>Ingredients:</label>
                    <div class="ingredient-item">
                        <input type="text" name="ingredient_name[]" class="ingredient_input_field" placeholder="Ingredient Name" required>
                        <input type="text" name="ingredient_quantity[]" placeholder="Quantity (e.g., 2 cups)">
                        <button type="button" class="remove-ingredient-btn">Remove</button>
                    </div>
                </div>
                
                
                <div class="section-divider">
                    <span>Instructions</span>
                </div>
                
                <div class="form-group">
                    <label for="description">Instructions (one step per line):</label>
                    <textarea id="description" name="description" required></textarea>
                </div>
                
                <div class="form-group tag-input">
                    <label for="recipe_tags">Tags (comma-separated):</label>
                    <input type="text" id="recipe_tags" name="recipe_tags" placeholder="e.g. vegan, gluten-free, quick">
                </div>
                
                <button type="submit" class="btn btn-block">Save Recipe</button>
            </form>
        </section>
    </main>
    
    <!-- Include your footer here -->
    
    <script type="module" src="../js/edit_recipe.js"></script>
</body>
</html>
