<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup - FoodX</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="auth-page">
    <main class="auth-outer-container">
        <div id="auth-container" class="auth-container show-login">

            <div class="auth-form-wrapper login-form-wrapper">
                <div class="auth-welcome-text">
                    <h1>Welcome<br>Back!</h1>
                    <p>Login to continue your culinary journey</p>
                </div>
                <div class="auth-form-container">
                    <h2>Login</h2>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-email">Email address</label>
                            <input type="email" id="login-email" name="email" placeholder="Email address" required>
                            <span class="error-message"></span>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" name="password" placeholder="Password" required>
                            <div class="forgot-password-link">
                                <a href="forgot_password.html">Forgot Password?</a>
                            </div>
                            <span class="error-message"></span>
                        </div>
                        <div class="server-error-message" id="login-server-error"></div>
                        <button type="submit" class="btn btn-block btn-primary">
                            <span class="btn-text">Login</span>
                            <span class="spinner"></span>
                        </button>
                        <div class="auth-switch">
                            <span>Don't have an account?</span>
                            <button type="button" class="btn-link" id="show-signup">Sign Up</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="auth-form-wrapper signup-form-wrapper">
                 <div class="auth-welcome-text">
                    <h1>Create<br>Account!</h1>
                    <p>Join us and start exploring recipes</p>
                </div>
                 <div class="auth-form-container">
                    <h2>Sign Up</h2>
                    <form id="signup-form">
                        <div class="form-group">
                            <label for="signup-name">Name</label>
                            <input type="text" id="signup-name" name="name" placeholder="Your Name" required>
                             <span class="error-message"></span>
                        </div>
                        <div class="form-group">
                            <label for="signup-email">Email address</label>
                            <input type="email" id="signup-email" name="email" placeholder="Email address" required>
                             <span class="error-message"></span>
                        </div>
                        <div class="form-group">
                            <label for="signup-password">Password</label>
                            <input type="password" id="signup-password" name="password" placeholder="Choose a Password" required minlength="6">
                             <span class="error-message"></span>
                        </div>
                        <div class="form-group">
                            <label for="signup-confirm-password">Confirm Password</label>
                            <input type="password" id="signup-confirm-password" name="confirm_password" placeholder="Confirm Password" required>
                             <span class="error-message"></span>
                        </div>
                        <div class="form-group form-group-checkbox">
                            <input type="checkbox" id="signup-is-admin-check" name="is_admin_check">
                            <label for="signup-is-admin-check"> Sign up as Admin?</label>
                        </div>
                        <div class="admin-code-container" id="admin-code-wrapper">
                            <div class="form-group">
                                <label for="signup-admin-code">Admin Code</label>
                                <input type="password" id="signup-admin-code" name="admin_code" placeholder="Enter admin code">
                                <span class="error-message"></span>
                            </div>
                        </div>
                        <div class="server-error-message" id="signup-server-error"></div>
                        <button type="submit" class="btn btn-block btn-primary">
                             <span class="btn-text">Sign Up</span>
                             <span class="spinner"></span>
                        </button>
                        <div class="auth-switch">
                            <span>Already have an account?</span>
                            <button type="button" class="btn-link" id="show-login">Login</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>
    <script src="../js/common.js" defer></script>
    <script type="module" src="../js/login.js"></script>
</body>
</html>
