<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FoodX</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/login.css"> </head>
<body class="auth-page">
    <main class="auth-outer-container">
        <div id="auth-container" class="auth-container">
            <div class="auth-form-wrapper">
                <div class="auth-welcome-text">
                    <h1>Set New<br>Password</h1>
                    <p>Enter and confirm your new password</p>
                </div>
                <div class="auth-form-container">
                    <h2>Reset Your Password</h2>
                    <form id="reset-password-form">
                        <input type="hidden" id="reset-email" name="email">
                        <input type="hidden" id="reset-token" name="token">

                        <div class="form-group">
                            <label for="new-password">New Password</label>
                            <input type="password" id="new-password" name="new_password" placeholder="Enter new password" required minlength="6">
                            <span class="error-message"></span>
                        </div>
                        <div class="form-group">
                            <label for="confirm-new-password">Confirm New Password</label>
                            <input type="password" id="confirm-new-password" name="confirm_new_password" placeholder="Confirm new password" required>
                            <span class="error-message"></span>
                        </div>
                        <div class="server-error-message" id="reset-server-error"></div>
                        <button type="submit" class="btn btn-block btn-primary">
                            <span class="btn-text">Update Password</span>
                            <span class="spinner"></span>
                        </button>
                         <div class="auth-switch">
                            <a href="login.html" class="btn-link">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/reset_password.js"></script> 
</body>
</html>
